<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}MediCare{% endblock %}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}
.navbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.navbar-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.navbar-brand .logo{background:#2563eb;color:#fff;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.navbar-brand .brand-text{font-size:18px;font-weight:700;color:#1e293b}
.navbar-brand .brand-sub{font-size:11px;color:#64748b}
.navbar-right{display:flex;align-items:center;gap:16px}
.navbar-user{text-align:right}
.navbar-user .username{font-weight:600;font-size:14px;color:#1e293b}
.navbar-user .role{font-size:12px;color:#64748b}
.btn-logout{background:#ef4444;color:#fff;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;text-decoration:none;transition:background .2s}
.btn-logout:hover{background:#dc2626}
.container{max-width:1200px;margin:0 auto;padding:32px 24px}
.page-header{margin-bottom:28px}
.page-header h1{font-size:26px;font-weight:700;color:#1e293b;margin-bottom:4px}
.page-header p{color:#64748b;font-size:14px}
.card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:24px;margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:20px 24px}
.stat-card .label{font-size:13px;color:#64748b;margin-bottom:8px}
.stat-card .value{font-size:32px;font-weight:700}
.value-blue{color:#2563eb}.value-green{color:#16a34a}.value-red{color:#ef4444}.value-purple{color:#7c3aed}.value-orange{color:#ea580c}.value-default{color:#1e293b}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-success{background:#16a34a;color:#fff}.btn-success:hover{background:#15803d}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-warning{background:#f59e0b;color:#fff}.btn-warning:hover{background:#d97706}
.btn-outline{background:#fff;border:1.5px solid #e2e8f0;color:#374151}.btn-outline:hover{border-color:#2563eb;color:#2563eb}
.btn-sm{padding:6px 14px;font-size:13px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-pending{background:#fef3c7;color:#92400e}
.badge-confirmed{background:#dbeafe;color:#1e40af}
.badge-completed{background:#dcfce7;color:#166534}
.badge-cancelled{background:#fee2e2;color:#991b1b}
.alert{padding:14px 18px;border-radius:10px;margin-bottom:16px;font-size:14px;font-weight:500}
.alert-success{background:#dcfce7;color:#166534;border:1px solid #86efac}
.alert-error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:#f8fafc;padding:12px 16px;text-align:left;font-weight:600;color:#64748b;border-bottom:2px solid #e2e8f0;font-size:13px}
td{padding:12px 16px;border-bottom:1px solid #f1f5f9;color:#374151}
tr:hover td{background:#f8fafc}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:16px;padding:32px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:20px;font-weight:700;margin-bottom:20px;color:#1e293b}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
.form-control{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;color:#1e293b;outline:none;transition:border .2s;background:#fff}
.form-control:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.tabs{display:flex;gap:4px;border-bottom:2px solid #e2e8f0;margin-bottom:24px}
.tab{padding:10px 20px;font-size:14px;font-weight:600;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;text-decoration:none;transition:all .2s}
.tab.active{color:#2563eb;border-bottom-color:#2563eb}
.tab:hover{color:#2563eb}
.appt-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:12px}
.appt-card:last-child{margin-bottom:0}
.appt-card .doctor{font-weight:600;font-size:15px;color:#1e293b;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.appt-card .meta{display:flex;gap:20px;font-size:13px;color:#64748b;margin-bottom:6px;flex-wrap:wrap}
.appt-card .meta span{display:flex;align-items:center;gap:5px}
.appt-card .reason{font-size:13px;color:#374151;margin-top:8px}
.appt-card .actions{margin-top:12px;display:flex;gap:8px}
.search-bar{display:flex;gap:12px;margin-bottom:20px;align-items:center}
.search-bar input,.search-bar select{padding:9px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;transition:border .2s}
.search-bar input:focus,.search-bar select:focus{border-color:#2563eb}
.empty-state{text-align:center;padding:48px;color:#94a3b8}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:15px}
@media(max-width:768px){.stats-grid{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.container{padding:16px}}
</style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
